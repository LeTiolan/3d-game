<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>A-Level 3D Web Game</title>
    <style>
        /* CSS Reset & Base Styles */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* 3D Canvas Container */
        #game-canvas {
            display: block;
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* UI Layer - Sits above the canvas */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none; /* Let clicks pass through to the game */
            display: none; /* Hidden until game starts */
        }

        /* Heads Up Display (HUD) Elements */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before { top: 9px; left: 0; width: 20px; height: 2px; }
        #crosshair::after { top: 0; left: 9px; width: 2px; height: 20px; }

        #stats-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .bar-container {
            width: 200px;
            height: 20px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #333;
            border-radius: 10px;
            margin-bottom: 10px;
            overflow: hidden;
        }

        #health-fill { width: 100%; height: 100%; background: #e74c3c; transition: width 0.2s; }
        #stamina-fill { width: 100%; height: 100%; background: #3498db; transition: width 0.1s; }

        #objective-tracker {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            color: #f1c40f;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #f1c40f;
            max-width: 250px;
        }

        /* Main Menu System */
        #main-menu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            pointer-events: auto;
        }

        h1.game-title {
            font-size: 5rem;
            color: #fff;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        p.subtitle {
            color: #a0a0b0;
            font-size: 1.2rem;
            margin-bottom: 50px;
        }

        .menu-btn {
            background: transparent;
            color: #fff;
            border: 2px solid #0f3460;
            padding: 15px 40px;
            font-size: 1.5rem;
            margin: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            width: 300px;
            border-radius: 5px;
        }

        .menu-btn:hover {
            background: #e94560;
            border-color: #e94560;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(233, 69, 96, 0.6);
        }

        #pause-menu {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
            pointer-events: auto;
        }

        .controls-info {
            position: absolute;
            bottom: 20px;
            color: #777;
            font-size: 0.9rem;
        }
    </style>
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="main-menu">
        <h1 class="game-title">Project: NEON</h1>
        <p class="subtitle">An Interactive 3D Web Experience</p>
        <button class="menu-btn" id="btn-start">Start Game</button>
        <button class="menu-btn" id="btn-settings">Settings</button>
        <div class="controls-info">WASD to Move | SPACE to Jump | SHIFT to Sprint | ESC to Pause</div>
    </div>

    <div id="pause-menu">
        <h1 style="color: white; margin-bottom: 40px;">PAUSED</h1>
        <button class="menu-btn" id="btn-resume">Resume</button>
        <button class="menu-btn" id="btn-quit">Quit to Menu</button>
    </div>

    <div id="ui-layer">
        <div id="crosshair"></div>
        
        <div id="objective-tracker">
            <h3 style="margin: 0 0 10px 0; font-size: 1.1rem;">Current Objective</h3>
            <p id="objective-text" style="margin: 0; font-size: 0.9rem;">Find the 3 Energy Cores to activate the portal.</p>
            <p style="margin: 10px 0 0 0; font-weight: bold;">Cores: <span id="core-count">0</span> / 3</p>
        </div>

        <div id="stats-panel">
            <div style="margin-bottom: 5px;">Health</div>
            <div class="bar-container"><div id="health-fill"></div></div>
            <div style="margin-bottom: 5px;">Stamina</div>
            <div class="bar-container"><div id="stamina-fill"></div></div>
        </div>
    </div>

    <script type="module" src="./game.js"></script>

</body>
</html>
